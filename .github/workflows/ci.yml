# CI for sysml-parser: build, test, and SysML v2 validation suite
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy -- -W clippy::all

  validation:
    name: SysML v2 validation suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Pin to release tag 2026-01; update -b if using a different release (https://github.com/Systems-Modeling/SysML-v2-Release/releases)
      - name: Clone SysML v2 Release
        run: |
          git clone --depth 1 https://github.com/Systems-Modeling/SysML-v2-Release.git "$RELEASE_ROOT" -b 2026-01
        env:
          RELEASE_ROOT: ${{ runner.temp }}/SysML-v2-Release-2026-01

      - name: cargo test (full validation suite)
        run: cargo test -- --include-ignored
        env:
          SYSML_V2_RELEASE_DIR: ${{ runner.temp }}/SysML-v2-Release-2026-01
